<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Force refresh while testing on GitHub Pages -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Lasă o recenzie – Proctoclinic</title>

  <style>
    :root {
      --gold: #f6b800;
      --gold-dark: #c98d00;
      --grey-star: #d5dbe4;
      --grey-star-dark: #b8c1cd;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 10% 10%, rgba(113, 138, 37, .08), transparent 24rem),
        radial-gradient(circle at 90% 20%, rgba(111, 157, 202, .12), transparent 24rem),
        #f7f9fb;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    /*
      IMPORTANT:
      There is NO separate mobile layout now.
      Phone and desktop both use the same approved final mockup image.
    */
    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 0;
      overflow-x: hidden;
    }

    .mockup {
      position: relative;
      width: min(100vw, calc(100vh * 1.333333));
      aspect-ratio: 4 / 3;
      max-width: 1448px;
      background: white;
      box-shadow: 0 18px 52px rgba(25, 52, 92, 0.08);
      overflow: hidden;
    }

    .mockup picture,
    .mockup img {
      display: block;
      width: 100%;
      height: 100%;
    }

    .mockup img {
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    /*
      This white strip hides only the baked-in gold stars from the mockup.
      The live stars sit on top of it.
    */
    .star-strip {
      position: absolute;
      left: 27.0%;
      top: 52.05%;
      width: 46.6%;
      height: 12.2%;
      background: rgba(255, 255, 255, 0.985);
      border-radius: 14px;
      z-index: 3;
      pointer-events: none;
    }

    .rating-layer {
      position: absolute;
      left: 27.0%;
      top: 52.05%;
      width: 46.6%;
      height: 12.2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 4;
    }

    .star {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      width: 15.2%;
      height: 100%;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--grey-star);
      -webkit-text-stroke: 1.9px var(--grey-star-dark);
      font-size: min(7.2vw, 92px);
      line-height: 1;
      text-shadow:
        0 3px 0 #bcc5d0,
        0 9px 20px rgba(25, 52, 92, 0.12);
      transform-origin: center;
      transition:
        color 150ms ease,
        -webkit-text-stroke-color 150ms ease,
        transform 150ms ease,
        filter 150ms ease,
        text-shadow 150ms ease;
      -webkit-tap-highlight-color: rgba(246, 184, 0, 0.18);
    }

    .star.is-active {
      color: var(--gold);
      -webkit-text-stroke-color: var(--gold-dark);
      text-shadow:
        0 3px 0 #d79500,
        0 12px 24px rgba(246, 184, 0, 0.34);
    }

    .star.is-hovered {
      transform: translateY(-6px) scale(1.10);
      filter: brightness(1.08);
    }

    .star:focus-visible {
      outline: 4px solid rgba(61, 120, 189, 0.24);
      border-radius: 18px;
    }

    .maps-hit {
      position: absolute;
      left: 37.0%;
      top: 67.4%;
      width: 26.2%;
      height: 5.8%;
      display: block;
      text-decoration: none;
      border-radius: 14px;
      outline: none;
      z-index: 4;
      -webkit-tap-highlight-color: rgba(61, 120, 189, 0.18);
    }

    .maps-hit:hover,
    .maps-hit:focus-visible {
      box-shadow: 0 0 0 4px rgba(61, 120, 189, 0.16);
      background: rgba(61, 120, 189, 0.06);
    }

    .sr-only {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    /*
      On phones, keep the same desktop design, just scaled to the screen width
      and placed near the top instead of switching to the old mobile layout.
    */
    @media (max-width: 760px) {
      .page {
        min-height: 100vh;
        place-items: start center;
        padding-top: 12px;
      }

      .mockup {
        width: 100vw;
        max-width: none;
        box-shadow: none;
      }

      .star {
        font-size: min(7.2vw, 92px);
        -webkit-text-stroke: 1.15px var(--grey-star-dark);
        text-shadow:
          0 1.6px 0 #bcc5d0,
          0 5px 12px rgba(25, 52, 92, 0.12);
      }

      .star.is-active {
        text-shadow:
          0 1.6px 0 #d79500,
          0 6px 14px rgba(246, 184, 0, 0.34);
      }

      .star.is-hovered {
        transform: translateY(-2px) scale(1.08);
      }
    }
  </style>
</head>

<body>
  <!-- same desktop-style layout on phone and desktop, v11 -->

  <main class="page" aria-label="Lasă o recenzie pentru Proctoclinic">
    <div class="mockup">
      <picture aria-hidden="true">
        <source srcset="assets/proctoclinic-review-final-mockup.webp" type="image/webp">
        <img src="assets/proctoclinic-review-final-mockup.png" alt="">
      </picture>

      <div class="star-strip" aria-hidden="true"></div>

      <h1 class="sr-only">Vă mulțumim că ați ales Proctoclinic</h1>
      <p class="sr-only">
        Feedback-ul dumneavoastră îi ajută pe alți pacienți să ia o decizie informată
        și ne ajută și pe noi să ne îmbunătățim serviciile.
      </p>

      <div class="rating-layer" role="radiogroup" aria-label="Alegeți numărul de stele pentru recenzia Google">
        <button class="star" type="button" data-rating="1" aria-label="1 stea">★</button>
        <button class="star" type="button" data-rating="2" aria-label="2 stele">★</button>
        <button class="star" type="button" data-rating="3" aria-label="3 stele">★</button>
        <button class="star" type="button" data-rating="4" aria-label="4 stele">★</button>
        <button class="star" type="button" data-rating="5" aria-label="5 stele">★</button>
      </div>

      <a class="maps-hit" href="https://www.google.com/maps/search/?api=1&query=Proctoclinic%20Bucuresti&query_place_id=ChIJERWRD_4BskARzT2DjEtLWCg" aria-label="Găsește Proctoclinic pe Google Maps"></a>
    </div>
  </main>

  <script>
    const reviewUrl = "https://search.google.com/local/writereview?placeid=ChIJERWRD_4BskARzT2DjEtLWCg";

    const stars = Array.from(document.querySelectorAll(".star"));
    let selected = 0;
    let navigating = false;

    function paint(rating, hoveredStar = null) {
      stars.forEach(star => {
        const value = Number(star.dataset.rating);
        star.classList.toggle("is-active", value <= rating);
        star.classList.toggle("is-hovered", hoveredStar === star);
        star.setAttribute("aria-checked", String(value === rating));
      });
    }

    function resetHover() {
      if (!navigating) paint(selected);
    }

    stars.forEach(star => {
      const rating = Number(star.dataset.rating);

      star.addEventListener("mouseenter", () => paint(rating, star));
      star.addEventListener("focus", () => paint(rating, star));
      star.addEventListener("mouseleave", resetHover);
      star.addEventListener("blur", resetHover);

      star.addEventListener("click", () => {
        selected = rating;
        navigating = true;
        paint(selected, star);
        setTimeout(() => {
          window.location.href = reviewUrl;
        }, 260);
      });

      star.addEventListener("touchstart", () => {
        selected = rating;
        paint(selected, star);
      }, { passive: true });
    });
  </script>
</body>
</html>
