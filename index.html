<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Lasă o recenzie – Proctoclinic</title>

  <style>
    :root {
      --gold: #f6b800;
      --gold-dark: #c98d00;
      --grey-star: #d6dde7;
      --grey-star-dark: #b6c0cd;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 10% 10%, rgba(113,138,37,.08), transparent 24rem),
        radial-gradient(circle at 90% 20%, rgba(111,157,202,.10), transparent 24rem),
        #f7f9fb;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .desktop-page,
    .mobile-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 0;
      overflow-x: hidden;
    }

    .mockup,
    .mobile-poster {
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .mockup {
      width: min(100vw, calc(100vh * 1.333333));
      aspect-ratio: 4 / 3;
      max-width: 1448px;
      box-shadow: 0 18px 52px rgba(25,52,92,.08);
    }

    .mobile-poster {
      display: none;
      width: min(100vw, 540px);
      aspect-ratio: 862 / 2105;
      box-shadow: 0 18px 52px rgba(25,52,92,.08);
    }

    picture,
    img {
      display: block;
      width: 100%;
      height: 100%;
    }

    img {
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .sr-only {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0,0,0,0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    /* DESKTOP: references the existing perfect desktop asset; do not replace it. */
    .desktop-star-strip {
      position: absolute;
      left: 27.0%;
      top: 52.05%;
      width: 46.6%;
      height: 12.2%;
      background: rgba(255,255,255,.985);
      border-radius: 14px;
      z-index: 3;
      pointer-events: none;
    }

    .desktop-rating {
      position: absolute;
      left: 27.0%;
      top: 52.05%;
      width: 46.6%;
      height: 12.2%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 4;
    }

    .desktop-map-hit {
      position: absolute;
      left: 37.0%;
      top: 67.4%;
      width: 26.2%;
      height: 5.8%;
      display: block;
      text-decoration: none;
      border-radius: 14px;
      z-index: 4;
      -webkit-tap-highlight-color: rgba(61,120,189,.18);
    }

    /* MOBILE: expanded card area so text, stars, and button all fit. */
    .mobile-rating {
      position: absolute;
      left: 12.5%;
      top: 53.2%;
      width: 75.0%;
      height: 5.1%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 4;
    }

    .mobile-map-button {
      position: absolute;
      left: 16.3%;
      top: 63.0%;
      width: 67.4%;
      min-height: 3.55%;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .55em;
      padding: .72em .95em;
      text-align: center;
      border: 2px solid #2a6bbe;
      border-radius: 18px;
      background: rgba(255,255,255,.97);
      color: #245ca9;
      font-weight: 700;
      font-size: clamp(15px, 3.5vw, 21px);
      line-height: 1.15;
      text-decoration: none;
      box-shadow: none;
      -webkit-tap-highlight-color: rgba(42,107,190,.08);
    }

    .mobile-map-button .pin,
    .mobile-map-button .ext {
      line-height: 1;
      flex: 0 0 auto;
    }

    .desktop-star,
    .mobile-star {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--grey-star);
      line-height: 1;
      transform-origin: center;
      transition:
        color 150ms ease,
        -webkit-text-stroke-color 150ms ease,
        transform 150ms ease,
        filter 150ms ease,
        text-shadow 150ms ease;
      -webkit-tap-highlight-color: rgba(246,184,0,.18);
    }

    .desktop-star {
      width: 15.2%;
      height: 100%;
      -webkit-text-stroke: 1.9px var(--grey-star-dark);
      font-size: min(7.2vw, 92px);
      text-shadow:
        0 3px 0 #bcc5d0,
        0 9px 20px rgba(25,52,92,.12);
    }

    .mobile-star {
      width: 15.7%;
      height: 100%;
      -webkit-text-stroke: 1.35px var(--grey-star-dark);
      font-size: clamp(52px, 12.2vw, 72px);
      text-shadow:
        0 2px 0 #bcc5d0,
        0 6px 12px rgba(25,52,92,.08);
    }

    .desktop-star.is-active,
    .mobile-star.is-active {
      color: var(--gold);
      -webkit-text-stroke-color: var(--gold-dark);
    }

    .desktop-star.is-active {
      text-shadow:
        0 3px 0 #d79500,
        0 12px 24px rgba(246,184,0,.34);
    }

    .mobile-star.is-active {
      text-shadow:
        0 2px 0 #d79500,
        0 8px 14px rgba(246,184,0,.24);
    }

    .desktop-star.is-hovered {
      transform: translateY(-6px) scale(1.10);
      filter: brightness(1.08);
    }

    .mobile-star.is-hovered {
      transform: translateY(-3px) scale(1.06);
      filter: brightness(1.08);
    }

    .desktop-star:focus-visible,
    .mobile-star:focus-visible {
      outline: 4px solid rgba(61,120,189,.24);
      border-radius: 18px;
    }

    .desktop-map-hit:hover,
    .desktop-map-hit:focus-visible {
      box-shadow: 0 0 0 4px rgba(61,120,189,.16);
      background: rgba(61,120,189,.06);
    }

    .mobile-map-button:hover,
    .mobile-map-button:focus-visible {
      background: #fff;
      box-shadow: 0 0 0 4px rgba(61,120,189,.08);
      outline: none;
    }

    @media (max-width: 760px) {
      .desktop-page {
        display: none;
      }

      .mobile-page {
        display: grid;
        place-items: start center;
        min-height: 100vh;
        padding: 0;
      }

      .mobile-poster {
        display: block;
        width: 100vw;
        max-width: 540px;
        box-shadow: none;
      }
    }

    @media (min-width: 761px) {
      .mobile-page {
        display: none;
      }
    }
  </style>
</head>

<body>
  <section class="desktop-page" aria-label="Lasă o recenzie pentru Proctoclinic">
    <div class="mockup">
      <picture aria-hidden="true">
        <source srcset="assets/proctoclinic-review-final-mockup.webp?v=25" type="image/webp">
        <img src="assets/proctoclinic-review-final-mockup.png?v=25" alt="">
      </picture>

      <div class="desktop-star-strip" aria-hidden="true"></div>

      <h1 class="sr-only">Vă mulțumim că ați ales Proctoclinic</h1>

      <div class="desktop-rating" role="radiogroup" aria-label="Alegeți numărul de stele pentru recenzia Google">
        <button class="desktop-star" type="button" data-rating="1" aria-label="1 stea">★</button>
        <button class="desktop-star" type="button" data-rating="2" aria-label="2 stele">★</button>
        <button class="desktop-star" type="button" data-rating="3" aria-label="3 stele">★</button>
        <button class="desktop-star" type="button" data-rating="4" aria-label="4 stele">★</button>
        <button class="desktop-star" type="button" data-rating="5" aria-label="5 stele">★</button>
      </div>

      <a class="desktop-map-hit" href="https://www.google.com/maps/search/?api=1&query=Proctoclinic%20Bucuresti&query_place_id=ChIJERWRD_4BskARzT2DjEtLWCg" aria-label="Găsește Proctoclinic pe Google Maps"></a>
    </div>
  </section>

  <section class="mobile-page" aria-label="Lasă o recenzie pentru Proctoclinic">
    <div class="mobile-poster">
      <picture aria-hidden="true">
        <source srcset="assets/proctoclinic-mobile-poster-no-stars.webp?v=25" type="image/webp">
        <img src="assets/proctoclinic-mobile-poster-no-stars.png?v=25" alt="">
      </picture>

      <h1 class="sr-only">Vă mulțumim că ați ales Proctoclinic</h1>

      <div class="mobile-rating" role="radiogroup" aria-label="Alegeți numărul de stele pentru recenzia Google">
        <button class="mobile-star" type="button" data-rating="1" aria-label="1 stea">★</button>
        <button class="mobile-star" type="button" data-rating="2" aria-label="2 stele">★</button>
        <button class="mobile-star" type="button" data-rating="3" aria-label="3 stele">★</button>
        <button class="mobile-star" type="button" data-rating="4" aria-label="4 stele">★</button>
        <button class="mobile-star" type="button" data-rating="5" aria-label="5 stele">★</button>
      </div>

      <a class="mobile-map-button" href="https://www.google.com/maps/search/?api=1&query=Proctoclinic%20Bucuresti&query_place_id=ChIJERWRD_4BskARzT2DjEtLWCg" aria-label="Găsește Proctoclinic pe Google Maps">
        <span class="pin">📍</span>
        <span>Găsește Proctoclinic pe Google Maps</span>
        <span class="ext">↗</span>
      </a>
    </div>
  </section>

  <script>
    const reviewUrl = "https://search.google.com/local/writereview?placeid=ChIJERWRD_4BskARzT2DjEtLWCg";

    function setupStars(selector) {
      const stars = Array.from(document.querySelectorAll(selector));
      let selected = 0;
      let navigating = false;

      function paint(rating, hoveredStar = null) {
        stars.forEach(star => {
          const value = Number(star.dataset.rating);
          star.classList.toggle("is-active", value <= rating);
          star.classList.toggle("is-hovered", hoveredStar === star);
          star.setAttribute("aria-checked", String(value === rating));
        });
      }

      function resetHover() {
        if (!navigating) paint(selected);
      }

      stars.forEach(star => {
        const rating = Number(star.dataset.rating);

        star.addEventListener("mouseenter", () => paint(rating, star));
        star.addEventListener("focus", () => paint(rating, star));
        star.addEventListener("mouseleave", resetHover);
        star.addEventListener("blur", resetHover);

        star.addEventListener("click", () => {
          selected = rating;
          navigating = true;
          paint(selected, star);
          setTimeout(() => {
            window.location.href = reviewUrl;
          }, 240);
        });

        star.addEventListener("touchstart", () => {
          selected = rating;
          paint(selected, star);
        }, { passive: true });
      });
    }

    setupStars(".desktop-star");
    setupStars(".mobile-star");
  </script>
</body>
</html>
